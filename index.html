<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="title-row">
      <h1 class="game-title">TETRIS</h1>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Cambiar entre modo claro y oscuro" title="Cambiar tema">🌙</button>
    </div>

    <div class="game-container">
      <aside class="panel panel-left">
        <div class="panel-section">
          <span class="label">HOLD</span>
          <canvas id="hold-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section highscores-section">
          <span class="label">HIGH SCORES</span>
          <table class="highscores-table">
            <tbody id="highscores-body"></tbody>
          </table>
          <div class="best-stats">
            <span>Mejor combo: <span id="best-combo">0</span></span>
            <span>Máx. líneas: <span id="best-lines">0</span></span>
          </div>
          <button id="reset-scores-btn" type="button">Reset records</button>
        </div>
      </aside>

      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <div class="score-row">
            <span class="value" id="score">0</span>
            <span class="combo hidden" id="combo">x2</span>
          </div>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>C</kbd> / <kbd>Shift</kbd> guardar</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>

      <div id="overlay" class="overlay hidden">
        <div class="overlay-box">
          <p id="overlay-title">GAME OVER</p>
          <p id="overlay-score"></p>

          <div id="overlay-endgame-extra" class="overlay-endgame-extra hidden">
            <div id="highscore-entry" class="highscore-entry hidden">
              <label for="highscore-name">¡Nuevo récord! Ingresa tu nombre:</label>
              <input type="text" id="highscore-name" maxlength="10" autocomplete="off" />
              <button id="highscore-submit-btn" type="button">Guardar</button>
            </div>

            <div class="overlay-highscores">
              <span class="label">HIGH SCORES</span>
              <table class="highscores-table">
                <tbody id="overlay-highscores-body"></tbody>
              </table>
              <div class="best-stats">
                <span>Mejor combo: <span id="overlay-best-combo">0</span></span>
                <span>Máx. líneas: <span id="overlay-best-lines">0</span></span>
              </div>
            </div>
          </div>

          <button id="restart-btn">Reiniciar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
